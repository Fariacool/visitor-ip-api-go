name: Release Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-docker-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      image: ${{ steps.meta.outputs.image }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Resolve ref and image tags
        id: meta
        run: |
          set -eu

          REF_TO_BUILD="${{ github.event.inputs.tag || github.ref }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=""
          fi

          OWNER_LOWER=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/${REPO_LOWER}"
          SHORT_SHA="${GITHUB_SHA::7}"

          {
            echo "ref=${REF_TO_BUILD}"
            echo "image=${IMAGE}"
            echo "short_sha=${SHORT_SHA}"
            echo "version=${VERSION}"
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            if [ -n "${VERSION}" ]; then
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:${VERSION#v}"
              case "${VERSION}" in
                v*.*.*)
                  echo "${IMAGE}:latest"
                  ;;
              esac
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            if [ -n "${VERSION}" ]; then
              echo "org.opencontainers.image.version=${VERSION}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.meta.outputs.image }}:sha-${{ needs.meta.outputs.short_sha }}-${{ matrix.arch }}
          labels: ${{ needs.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ${{ needs.meta.outputs.image }}
          SHORT_SHA: ${{ needs.meta.outputs.short_sha }}
          TAGS: ${{ needs.meta.outputs.tags }}
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              tag_args+=("-t" "${tag}")
            fi
          done <<< "${TAGS}"

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${IMAGE}:sha-${SHORT_SHA}-amd64" \
            "${IMAGE}:sha-${SHORT_SHA}-arm64"
