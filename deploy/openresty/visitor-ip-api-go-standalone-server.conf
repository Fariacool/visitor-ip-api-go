# Place this file in a directory included from the `http {}` context,
# for example:
#   /usr/local/openresty/nginx/conf/conf.d/visitor-ip-api-go.conf
#
# Update `server_name` as needed.
#
# This enhanced version makes OpenResty the source of truth for CORS:
# - hides upstream Access-Control-Allow-* headers
# - answers OPTIONS directly with 204
# - adds CORS headers even on proxy-generated errors

server {
    listen 80;
    listen [::]:80;
    server_name visitor-ip-api-go.example.com;

    client_max_body_size 1m;

    location / {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept, Origin" always;
        add_header Access-Control-Max-Age "86400" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type "text/plain; charset=utf-8";
            return 204;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Connecting-IPv6 $http_cf_connecting_ipv6;

        proxy_pass http://127.0.0.1:8466;
    }
}
